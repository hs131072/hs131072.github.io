<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钢铁履带3D - 全装甲战争终极版</title>
    <style>
        :root {
            --primary-color: #00ffcc;
            --enemy-color: #ff3333;
            --ally-color: #33ff33;
            --bg-glass: rgba(10, 20, 30, 0.85);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', '微软雅黑', monospace;
            user-select: none;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* UI层 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 坦克标识 */
        .tank-label {
            position: absolute;
            transform: translate(-50%, -100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 0 1px 2px black;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        .tank-name {
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 4px;
            white-space: nowrap;
        }

        .hp-bar-container {
            width: 40px;
            height: 4px;
            background: #333;
            border: 1px solid #000;
            border-radius: 2px;
            overflow: hidden;
        }

        .hp-bar-fill {
            height: 100%;
            background: var(--ally-color);
            width: 100%;
            transition: width 0.2s ease-out, background-color 0.2s;
        }

        .enemy .tank-name { color: var(--enemy-color); }
        .enemy .hp-bar-fill { background: var(--enemy-color); }
        .ally .tank-name { color: var(--ally-color); }
        .player .tank-name { color: #ffd700; font-size: 12px; border: 1px solid #ffd700; }
        .稀有 .tank-name { color: #00bfff; }
        .传奇 .tank-name { color: #ff8c00; }

        /* HUD左上角 */
        #hud-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: auto;
        }

        /* 小地图 */
        #minimap-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: 180px;
            background: var(--bg-glass);
            border: 2px solid #444;
            border-radius: 50%;
            overflow: hidden;
            pointer-events: auto;
        }
        
        #minimap-canvas {
            width: 100%;
            height: 100%;
        }

        /* 底部HUD */
        #hud-bottom {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: flex-end;
        }

        .hud-panel {
            background: var(--bg-glass);
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            text-align: center;
            min-width: 100px;
        }

        .hud-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .hud-label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 204, 0.8);
        }
        
        #crosshair::before { top: 19px; left: 0; width: 40px; height: 2px; }
        #crosshair::after { left: 19px; top: 0; width: 2px; height: 40px; }

        #reload-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }

        #reload-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            box-sizing: border-box;
            transform: rotate(-90deg);
            transition: clip-path 0.1s linear;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        button {
            background: var(--primary-color);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.05); }

        .damage-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 0 0 rgba(255, 0, 0, 0);
            pointer-events: none;
            transition: box-shadow 0.2s;
            z-index: 5;
        }

        /* 新增控制面板 */
        #control-panel {
            position: absolute;
            top: 20px;
            right: 220px;
            background: var(--bg-glass);
            padding: 15px;
            border-radius: 8px;
            color: white;
            z-index: 20;
            pointer-events: auto;
            font-size: 12px;
        }

        #ammo-type-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 120px);
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 0 5px black;
        }
    </style>

        </div>

        <div id="minimap-container">

        <div id="control-panel">

            <div>1/2/3 - 切换弹药类型</div>
            <div>Shift - 加速冲刺</div>
            <div>C - 切换视角模式</div>
        </div>
    </div>

// ==========================================
// 工具函数与数学计算库
// ==========================================

const Utils = {
    rand: (min, max) => Math.random() * (max - min) + min,
    randInt: (min, max) => Math.floor(Math.random() * (max - min + 1) + min),
    clamp: (val, min, max) => Math.min(Math.max(val, min), max),
    lerp: (start, end, t) => start * (1 - t) + end * t,
    
    // 平滑角度插值，消除炮塔转向时的卡顿抖动
    slerpAngle: (current, target, speed) => {
        let diff = target - current;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return current + diff * speed;
    },

    distance: (v1, v2) => v1.distanceTo(v2)
};

// ==========================================
// 粒子特效与渲染系统
// ==========================================

class ParticleSystem {
    constructor(scene) {
        this.scene = scene;
        this.particles = [];
        
        // 共享几何体与材质，大幅降低渲染性能消耗
        this.smokeGeo = new THREE.SphereGeometry(1, 8, 8);
        this.smokeMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.6 });
        this.sparkGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
        this.sparkMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        this.fireGeo = new THREE.SphereGeometry(0.8, 8, 8);
        this.fireMat = new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.7 });
    }

    emitSmoke(position, count = 5) {
        for (let i = 0; i < count; i++) {
            const mesh = new THREE.Mesh(this.smokeGeo, this.smokeMat.clone());
            mesh.position.copy(position);
            mesh.position.x += Utils.rand(-0.5, 0.5);
            mesh.position.z += Utils.rand(-0.5, 0.5);
            mesh.scale.setScalar(Utils.rand(0.5, 1.5));
            
            const velocity = new THREE.Vector3(Utils.rand(-0.1, 0.1), Utils.rand(0.1, 0.3), Utils.rand(-0.1, 0.1));
            
            this.scene.add(mesh);
            this.particles.push({ mesh, velocity, life: 1.0, type: 'smoke' });
        }
    }

    emitSparks(position, count = 8) {
        for (let i = 0; i < count; i++) {
            const mesh = new THREE.Mesh(this.sparkGeo, this.sparkMat);
            mesh.position.copy(position);
            
            const velocity = new THREE.Vector3(Utils.rand(-0.5, 0.5), Utils.rand(0, 0.5), Utils.rand(-0.5, 0.5));
            
            this.scene.add(mesh);
            this.particles.push({ mesh, velocity, life: 0.5, type: 'spark' });
        }
    }

    emitFire(position, count = 6) {
        for (let i = 0; i < count; i++) {
            const mesh = new THREE.Mesh(this.fireGeo, this.fireMat.clone());
            mesh.position.copy(position);
            mesh.position.y += Utils.rand(0, 1);
            
            const velocity = new THREE.Vector3(Utils.rand(-0.05, 0.05), Utils.rand(0.1, 0.4), Utils.rand(-0.05, 0.05));
            
            this.scene.add(mesh);
            this.particles.push({ mesh, velocity, life: 0.8, type: 'fire' });
        }
    }

    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.life -= dt / 1000; // dt以毫秒为单位转换为秒级生命周期

            if (p.life <= 0) {
                this.scene.remove(p.mesh);
                this.particles.splice(i, 1);
                continue;
            }

            p.mesh.position.add(p.velocity);
            
            if (p.type === 'smoke') {
                p.mesh.rotation.x += dt * 0.001;
                p.mesh.rotation.y += dt * 0.001;
                p.mesh.material.opacity = p.life * 0.4;
                p.mesh.scale.multiplyScalar(1.01); // 烟雾随时间向外扩散
            } else if (p.type === 'spark') {
                p.mesh.material.opacity = p.life * 2;
                p.velocity.y -= 0.02; // 火花模拟重力下落效果
            } else if (p.type === 'fire') {
                p.mesh.material.opacity = p.life * 0.8;
                p.mesh.scale.multiplyScalar(1.03); // 火焰随时间膨胀
            }
        }
    }
}

// ==========================================
// 炮弹实体类，处理飞行碰撞逻辑
// ==========================================

class Bullet {
    constructor(position, quaternion, owner, ammoType) {
        this.owner = owner;
        this.speed = 5.5;
        this.ammoType = ammoType;
        this.damage = owner.stats.damage * ammoType.damageMult;
        this.armorPen = ammoType.armorPen;
        this.active = true;
        this.lifeTime = 3000; // 炮弹最大存活时间3秒

        const geometry = new THREE.SphereGeometry(0.15, 8, 8);
        const material = new THREE.MeshBasicMaterial({ color: ammoType.color });
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.position.copy(position);
        
        // 炮弹挂载点光源，实现发光尾迹效果
        this.light = new THREE.PointLight(ammoType.color, 1.5, 12);
        this.mesh.add(this.light);

        this.direction = new THREE.Vector3(0, 0, 1);
        this.direction.applyQuaternion(quaternion);

        scene.add(this.mesh);
    }

    update(dt, tanks) {
        if (!this.active) return;

        this.lifeTime -= dt;
        if (this.lifeTime <= 0) this.destroy();

        // 按飞行方向移动炮弹
        const moveStep = this.direction.clone().multiplyScalar(this.speed);
        this.mesh.position.add(moveStep);

        // 坦克碰撞检测
        for (const tank of tanks) {
            if (tank === this.owner || tank.isDead) continue;
            
            const dist = this.mesh.position.distanceTo(tank.mesh.position);
            // 碰撞判定半径2.5，适配坦克模型尺寸
            if (dist < 2.5) {
                this.hit(tank);
                break;
            }
        }
    }

    hit(tank) {
        this.active = false;
        this.destroy();
        
        // 基于装甲和穿深计算最终实际伤害
        const actualDamage = this.damage * (1 - tank.stats.armor * (1 - this.armorPen));
        
        tank.takeDamage(actualDamage);
        game.effects.emitSparks(this.mesh.position, 12);
        game.effects.emitFire(this.mesh.position, 4);
    }

    destroy() {
        scene.remove(this.mesh);
    }
}

// ==========================================
// 坦克实体类，处理玩家控制与AI逻辑
// ==========================================

class Tank {
    constructor(variantData, position, team, isPlayer = false) {
        this.stats = variantData;
        this.team = team;
        this.isPlayer = isPlayer;
        this.isDead = false;
        this.currentHp = this.stats.hp;
        
        this.velocity = 0;
        this.rotationVelocity = 0;
        this.lastShotTime = 0;
        this.currentAmmo = 0; // 默认弹药为穿甲弹
        this.isSprinting = false;
        
        // AI状态机
        this.aiState = 'patrol';
        this.targetTank = null;
        this.aiChangeStateTimer = 0;

        this.mesh = this.createModel();
        this.mesh.position.copy(position);
        scene.add(this.mesh);

        this.createLabel();
    }

    createModel() {
        const group = new THREE.Group();

        // 1. 坦克车体底盘
        const chassisGeo = new THREE.BoxGeometry(2.2, 1, 4.5);
        const chassisMat = new THREE.MeshStandardMaterial({ 
            color: this.stats.color, 
            roughness: 0.7,
            metalness: 0.3
        });
        const chassis = new THREE.Mesh(chassisGeo, chassisMat);
        chassis.position.y = 0.8;
        chassis.castShadow = true;
        chassis.receiveShadow = true;
        group.add(chassis);

        // 左右履带模型
        const trackGeo = new THREE.BoxGeometry(0.4, 0.8, 4.6);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const leftTrack = new THREE.Mesh(trackGeo, trackMat);
        leftTrack.position.set(-1.2, 0.6, 0);
        const rightTrack = new THREE.Mesh(trackGeo, trackMat);
        rightTrack.position.set(1.2, 0.6, 0);
        group.add(leftTrack);
        group.add(rightTrack);

        // 2. 炮塔组，可绕Y轴独立旋转
        this.turretGroup = new THREE.Group();
        this.turretGroup.position.set(0, 1.3, 0);
        group.add(this.turretGroup);

        const turretGeo = new THREE.BoxGeometry(1.6, 0.8, 2.2);
        const turretMat = new THREE.MeshStandardMaterial({ color: this.stats.color });
        const turretHead = new THREE.Mesh(turretGeo, turretMat);
        turretHead.position.y = 0.4;
        turretHead.castShadow = true;
        this.turretGroup.add(turretHead);

        // 3. 主炮模型，挂载在炮塔上
        const barrelLength = 3.5;
        const barrelGeo = new THREE.CylinderGeometry(0.12, 0.15, barrelLength, 12);
        const barrelMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        this.barrel = new THREE.Mesh(barrelGeo, barrelMat);
        
        // 将圆柱体旋转为车头正前方向(Z轴正方向)
        this.barrel.rotation.x = Math.PI / 2;
        this.barrel.position.set(0, 0.4, 1.5); 
        this.barrel.castShadow = true;
        
        // 炮口制退器细节模型
        const muzzleGeo = new THREE.BoxGeometry(0.25, 0.25, 0.4);
        const muzzle = new THREE.Mesh(muzzleGeo, barrelMat);
        muzzle.position.set(0, 0, barrelLength/2);
        this.barrel.add(muzzle);

        this.turretGroup.add(this.barrel);

        return group;
    }

    createLabel() {
        const div = document.createElement('div');
        div.className = `tank-label ${this.team === 'enemy' ? 'enemy' : (this.isPlayer ? 'player' : 'ally')} ${this.stats.rarity}`;
        
        const nameDiv = document.createElement('div');
        nameDiv.className = 'tank-name';
        nameDiv.textContent = this.isPlayer ? "玩家" : this.stats.name;
        
        const hpContainer = document.createElement('div');
        hpContainer.className = 'hp-bar-container';
        this.hpFill = document.createElement('div');
        this.hpFill.className = 'hp-bar-fill';
        hpContainer.appendChild(this.hpFill);

        div.appendChild(nameDiv);
        div.appendChild(hpContainer);
        document.getElementById('ui-layer').appendChild(div);
        
        this.labelElement = div;
    }

    updateLabel(camera) {
        if (this.isDead) {
            this.labelElement.style.display = 'none';
            return;
        }

        // 将3D世界坐标投影到2D屏幕坐标，实现头顶标识跟随
        const pos = this.mesh.position.clone();
        pos.y += 3.5; // 标识向上偏移，悬浮在坦克头顶
        pos.project(camera);

        const x = (pos.x * .5 + .5) * window.innerWidth;
        const y = (-(pos.y * .5) + .5) * window.innerHeight;

        // 摄像机背面的坦克自动隐藏标识，避免穿屏错误
        if (pos.z > 1) {
            this.labelElement.style.display = 'none';
        } else {
            this.labelElement.style.display = 'flex';
            this.labelElement.style.left = `${x}px`;
            this.labelElement.style.top = `${y}px`;
        }
    }

    takeDamage(amount) {
        this.currentHp -= amount;
        const pct = Math.max(0, (this.currentHp / this.stats.hp) * 100);
        this.hpFill.style.width = `${pct}%`;

        if (this.currentHp <= 0) {
            this.die();
        }
    }

    die() {
        this.isDead = true;
        this.mesh.visible = false;
        this.labelElement.remove();
        game.effects.emitSmoke(this.mesh.position, 25);
        game.effects.emitSparks(this.mesh.position, 40);
        game.effects.emitFire(this.mesh.position, 10);
        
        // 爆炸闪光效果
        const explosionLight = new THREE.PointLight(0xff5500, 3, 30);
        explosionLight.position.copy(this.mesh.position);
        explosionLight.position.y += 3;
        scene.add(explosionLight);
        setTimeout(() => scene.remove(explosionLight), 300);

        if (this.isPlayer) {
            game.gameOver(false);
        } else {
            game.onTankDestroyed(this);
        }
    }

    fire() {
        const now = Date.now();
        const currentAmmo = AMMO_TYPES[this.currentAmmo];
        if (now - this.lastShotTime < this.stats.reload) return false;

        this.lastShotTime = now;

        // 计算炮口在世界坐标系中的实际位置
        const muzzleLocalPos = new THREE.Vector3(0, 0.4, 1.5 + barrelLength/2);
        muzzleLocalPos.applyMatrix4(this.turretGroup.matrixWorld);

        // 获取炮塔当前全局旋转四元数
        const turretQuaternion = new THREE.Quaternion();
        this.turretGroup.getWorldQuaternion(turretQuaternion);

        // 生成新炮弹实体
        game.bullets.push(new Bullet(muzzleLocalPos, turretQuaternion, this, currentAmmo));

        // 开炮烟雾特效
        game.effects.emitSmoke(muzzleLocalPos, 4);
        
        // 模拟后坐力动画
        this.barrel.position.z -= 0.25;
        setTimeout(() => {
            if(!this.isDead) this.barrel.position.z += 0.25;
        }, 120);

        return true;
    }

    switchAmmo() {
        this.currentAmmo = (this.currentAmmo + 1) % AMMO_TYPES.length;
        const currentAmmo = AMMO_TYPES[this.currentAmmo];
        document.getElementById('ammo-type-display').textContent = `弹药：${currentAmmo.name}`;
    }

    update(dt, allTanks, playerInput) {
        if (this.isDead) return;

        if (this.isPlayer) {
            this.handlePlayerControl(dt, playerInput);
        } else {
            this.handleAI(dt, allTanks);
        }

        // 地图边界锁定，防止坦克驶出战斗区域
        const limit = CONFIG.mapSize / 2;
        this.mesh.position.x = Utils.clamp(this.mesh.position.x, -limit, limit);
        this.mesh.position.z = Utils.clamp(this.mesh.position.z, -limit, limit);
    }

    handlePlayerControl(dt, input) {
        // W/S 控制坦克前进后退，支持Shift冲刺加速
        const targetSpeed = input.sprint ? this.stats.maxSpeed * 1.8 : (input.forward ? this.stats.maxSpeed : (input.backward ? -this.stats.maxSpeed * 0.5 : 0));
        this.velocity = Utils.lerp(this.velocity, targetSpeed, 0.1);
        this.mesh.translateZ(this.velocity);

        // A/D 控制车体左右转向
        if (input.left) this.mesh.rotation.y += 0.022;
        if (input.right) this.mesh.rotation.y -= 0.022;

        // 鼠标瞄准逻辑，通过射线投射地面获取瞄准点
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(input.mousePos, camera);
        const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        const intersectPos = new THREE.Vector3();
        raycaster.ray.intersectPlane(groundPlane, intersectPos);

        if (intersectPos) {
            const dx = intersectPos.x - this.mesh.position.x;
            const dz = intersectPos.z - this.mesh.position.z;
            const targetAngle = Math.atan2(dx, dz);
            
            const bodyRotation = this.mesh.rotation.y;
            let desiredLocalTurretAngle = targetAngle - bodyRotation;
            
            // 角度归一化到[-π, π]区间，避免转向绕远
            while (desiredLocalTurretAngle > Math.PI) desiredLocalTurretAngle -= Math.PI * 2;
            while (desiredLocalTurretAngle < -Math.PI) desiredLocalTurretAngle += Math.PI * 2;

            this.turretGroup.rotation.y = Utils.slerpAngle(this.turretGroup.rotation.y, desiredLocalTurretAngle, 0.15);
        }

        // 玩家开火判定
        if (input.firing) {
            if (this.fire()) {
                game.updateReloadUI(this.stats.reload);
            }
        }

        // 切换弹药判定
        if (input.switchAmmo) {
            this.switchAmmo();
            input.switchAmmo = false;
        }

        this.isSprinting = input.sprint;
    }

    handleAI(dt, allTanks) {
        // 自动搜索最近的敌方单位作为攻击目标
        if (!this.targetTank || this.targetTank.isDead) {
            let minDist = Infinity;
            let closestEnemy = null;
            
            for (const other of allTanks) {
                if (other === this || other.isDead) continue;
                const isHostile = (this.team === 'ally' && other.team !== 'ally') || 
                                (this.team === 'enemy' && other.team === 'ally') ||
                                (this.team === 'enemy' && other.isPlayer);
                
                if (isHostile) {
                    const dist = this.mesh.position.distanceTo(other.mesh.position);
                    if (dist < minDist) {
                        minDist = dist;
                        closestEnemy = other;
                    }
                }
            }
            this.targetTank = closestEnemy;
        }

        // AI状态机逻辑
        if (this.targetTank) {
            const distToTarget = this.mesh.position.distanceTo(this.targetTank.mesh.position);
            const angleToTarget = Math.atan2(
                this.targetTank.mesh.position.x - this.mesh.position.x,
                this.targetTank.mesh.position.z - this.mesh.position.z
            );

            // 车体自动转向目标
            let bodyAngleDiff = angleToTarget - this.mesh.rotation.y;
            while (bodyAngleDiff > Math.PI) bodyAngleDiff -= Math.PI * 2;
            while (bodyAngleDiff < -Math.PI) bodyAngleDiff += Math.PI * 2;
            
            if (Math.abs(bodyAngleDiff) > 0.1) {
                this.mesh.rotation.y += Math.sign(bodyAngleDiff) * 0.015;
            } else {
                // 距离过远前进接敌，距离过近后退拉开安全射击距离
                if (distToTarget > 25) {
                    this.mesh.translateZ(this.stats.maxSpeed * 0.7);
                } else if (distToTarget < 12) {
                    this.mesh.translateZ(-this.stats.maxSpeed * 0.35);
                }
            }

            // 炮塔自动指向目标方位
            const localTargetAngle = angleToTarget - this.mesh.rotation.y;
            let turretAngleDiff = localTargetAngle - this.turretGroup.rotation.y;
            while (turretAngleDiff > Math.PI) turretAngleDiff -= Math.PI * 2;
            while (turretAngleDiff < -Math.PI) turretAngleDiff += Math.PI * 2;
            
            this.turretGroup.rotation.y += turretAngleDiff * 0.05;

            // 瞄准条件满足后自动开火
            if (Math.abs(turretAngleDiff) < 0.12 && distToTarget < 45) {
                this.fire();
            }

        } else {
            // 无目标时自动随机巡逻
            this.aiChangeStateTimer -= dt;
            if (this.aiChangeStateTimer <= 0) {
                this.patrolAngle = Math.random() * Math.PI * 2;
                this.aiChangeStateTimer = 2500 + Math.random() * 3500;
            }
            
            let diff = this.patrolAngle - this.mesh.rotation.y;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            
            this.mesh.rotation.y += diff * 0.02;
            this.mesh.translateZ(this.stats.maxSpeed * 0.35);
        }
    }
}

// ==========================================
// 主游戏控制逻辑
// ==========================================

class Game {
    constructor() {
        this.tanks = [];
        this.bullets = [];
        this.player = null;
        this.score = 0;
        this.killCount = 0;
        this.isRunning = false;
        this.cameraMode = 0; // 0:追尾视角 1:自由视角 2:炮塔跟随视角
        
        this.playerInput = {
            forward: false, backward: false, left: false, right: false, sprint: false,
            firing: false, switchAmmo: false,
            mousePos: new THREE.Vector2()
        };

        this.initScene();
        this.initEvents();
        this.minimapCanvas = document.getElementById('minimap-canvas');
        this.minimapCtx = this.minimapCanvas.getContext('2d');
    }

    initScene() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x121212);
        scene.fog = new THREE.FogExp2(0x121212, 0.007);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1200);
        camera.position.set(0, 30, 40);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('game-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x404040, 1.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
        dirLight.position.set(120, 180, 60);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = CONFIG.shadowMapSize;
        dirLight.shadow.mapSize.height = CONFIG.shadowMapSize;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 600;
        dirLight.shadow.camera.left = -CONFIG.mapSize/2;
        dirLight.shadow.camera.right = CONFIG.mapSize/2;
        dirLight.shadow.camera.top = CONFIG.mapSize/2;
        dirLight.shadow.camera.bottom = -CONFIG.mapSize/2;
        scene.add(dirLight);

        const groundGeo = new THREE.PlaneGeometry(CONFIG.mapSize, CONFIG.mapSize);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: CONFIG.colors.ground,
            roughness: 0.85,
            metalness: 0.15
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(CONFIG.mapSize, 60, CONFIG.colors.grid, 0x222222);
        scene.add(gridHelper);

        // 随机生成战场障碍物
        const obstacleGeo = new THREE.BoxGeometry(5, 5, 5);
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a });
        for(let i=0; i<50; i++) {
            const obstacle = new THREE.Mesh(obstacleGeo, obstacleMat);
            obstacle.position.set(
                Utils.rand(-CONFIG.mapSize/2 + 10, CONFIG.mapSize/2 - 10),
                2.5,
                Utils.rand(-CONFIG.mapSize/2 + 10, CONFIG.mapSize/2 - 10)
            );
            obstacle.castShadow = true;
            obstacle.receiveShadow = true;
            scene.add(obstacle);
        }

        this.effects = new ParticleSystem(scene);
    }

    initEvents() {
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': this.playerInput.forward = true; break;
                case 'KeyS': this.playerInput.backward = true; break;
                case 'KeyA': this.playerInput.left = true; break;
                case 'KeyD': this.playerInput.right = true; break;
                case 'ShiftLeft': this.playerInput.sprint = true; break;
                case 'Digit1': this.player.currentAmmo = 0; document.getElementById('ammo-type-display').textContent = '弹药：穿甲弹'; break;
                case 'Digit2': this.player.currentAmmo = 1; document.getElementById('ammo-type-display').textContent = '弹药：高爆弹'; break;
                case 'Digit3': this.player.currentAmmo = 2; document.getElementById('ammo-type-display').textContent = '弹药：破甲弹'; break;
                case 'KeyC': this.cameraMode = (this.cameraMode + 1) % 3; break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': this.playerInput.forward = false; break;
                case 'KeyS': this.playerInput.backward = false; break;
                case 'KeyA': this.playerInput.left = false; break;
                case 'KeyD': this.playerInput.right = false; break;
                case 'ShiftLeft': this.playerInput.sprint = false; break;
            }
        });

        document.addEventListener('mousemove', (e) => {
            this.playerInput.mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
            this.playerInput.mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        document.addEventListener('mousedown', () => this.playerInput.firing = true);
        document.addEventListener('mouseup', () => this.playerInput.firing = false);

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.body.requestPointerLock();
            this.startGame();
        });
    }

    startGame() {
        this.isRunning = true;
        this.spawnAllTanks();
        this.lastFrameTime = Date.now();
        this.gameLoop();
    }

    spawnAllTanks() {
        // 生成玩家控制的默认99A式坦克
        const playerTankData = TANK_DATABASE[2];
        this.player = new Tank(playerTankData, new THREE.Vector3(0, 0, 0), 'player', true);
        this.tanks.push(this.player);

        // 生成29辆友军坦克
        for (let i = 0; i < 29; i++) {
            const spawnPos = new THREE.Vector3(Utils.rand(-80, 80), 0, Utils.rand(30, 120));
            const randomVariant = TANK_VARIANTS[Utils.randInt(0, 59)];
            this.tanks.push(new Tank(randomVariant, spawnPos, 'ally'));
        }

        // 生成30辆敌方坦克
        for (let i = 0; i < 30; i++) {
            const spawnPos = new THREE.Vector3(Utils.rand(-150, 150), 0, Utils.rand(-200, -40));
            const randomVariant = TANK_VARIANTS[Utils.randInt(0, 59)];
            this.tanks.push(new Tank(randomVariant, spawnPos, 'enemy'));
        }
    }

    onTankDestroyed(tank) {
        if (tank.team === 'enemy') {
            this.score += 100;
            this.killCount += 1;
            document.getElementById('score-val').innerText = this.score;
            document.getElementById('kill-count').innerText = this.killCount;
        }
        
        const enemiesLeft = this.tanks.filter(t => t.team === 'enemy' && !t.isDead).length;
        document.getElementById('enemy-count').innerText = enemiesLeft;
        
        const alliesLeft = this.tanks.filter(t => (t.team === 'ally' || t.isPlayer) && !t.isDead).length;
        document.getElementById('ally-count').innerText = alliesLeft;

        // 胜利判定：全歼所有敌方单位
        if (enemiesLeft === 0) {
            this.gameOver(true);
        }
    }

    gameOver(win) {
        this.isRunning = false;
        const screen = document.getElementById('start-screen');
        const h1 = screen.querySelector('h1');
        const p = screen.querySelector('p');
        const btn = screen.querySelector('button');
        
        screen.style.display = 'flex';
        h1.innerText = win ? "任务完成！全歼敌军！" : "任务失败，你的坦克已被击毁";
        h1.style.color = win ? "#00ffcc" : "#ff3333";
        p.innerText = `最终得分: ${this.score} | 总击杀: ${this.killCount}`;
        btn.innerText = "重新开始作战";
        btn.onclick = () => location.reload();
    }

   updateReloadUI(cooldown) {
    const bar = document.getElementById('reload-bar');
    const ammoText = document.getElementById('ammo-val');
    
    ammoText.innerText = "LOADING...";
    ammoText.style.color = "#ff3333";
    
    let startTime = Date.now();
    
    const interval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / cooldown, 1);
        
        // Update CSS clip-path or rotation to show progress
        // Simple rotation hack for circular loader
        const deg = progress * 360;
        bar.style.transform = `rotate(${deg - 90}deg)`;
        
        if (progress >= 1) {
            clearInterval(interval);
            ammoText.innerText = "READY";
            ammoText.style.color = "#00ffcc";
            bar.style.transform = `rotate(-90deg)`;
        }
    }, 16);
},

updateHUD() {
    if (!this.player) return;
    
    // HP
    const hpPct = Math.ceil((this.player.currentHp / this.player.stats.hp) * 100);
    document.getElementById('hp-val').innerText = `${hpPct}%`;
    
    // Speed
    const speedKmH = Math.abs(Math.round(this.player.velocity * 50));
    document.getElementById('speed-val').innerText = `${speedKmH} km/h`;

    // Damage Overlay
    const overlay = document.getElementById('damage-overlay');
    if (hpPct < 30) {
        overlay.style.boxShadow = "inset 0 0 50px 20px rgba(255, 0, 0, 0.3)";
    } else {
        overlay.style.boxShadow = "none";
    }
},

drawMinimap() {
    const ctx = this.minimapCtx;
    const w = this.minimapCanvas.width = 150;
    const h = this.minimapCanvas.height = 150;
    const scale = w / CONFIG.mapSize;

    ctx.clearRect(0, 0, w, h);
    
    // Background
    ctx.fillStyle = "rgba(0, 20, 0, 0.5)";
    ctx.fillRect(0, 0, w, h);

    // Draw Tanks
    this.tanks.forEach(t => {
        if (t.isDead) return;
        
        const x = (t.mesh.position.x + CONFIG.mapSize/2) * scale;
        const y = (t.mesh.position.z + CONFIG.mapSize/2) * scale; // Z is Y on 2D map
        
        ctx.fillStyle = t.isPlayer ? "#ffff00" : (t.team === 'ally' ? "#00ff00" : "#ff0000");
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI*2);
        ctx.fill();
    });
},

loop() {
    if (!this.isRunning) return;
    requestAnimationFrame(() => this.loop());

    const now = Date.now();
    const dt = now - this.lastTime;
    this.lastTime = now;

    // 1. Update Tanks
    this.tanks.forEach(tank => tank.update(dt, this.tanks, this.input));

    // 2. Update Bullets
    for (let i = this.bullets.length - 1; i >= 0; i--) {
        this.bullets[i].update(dt, this.tanks);
        if (!this.bullets[i].active) {
            this.bullets.splice(i, 1);
        }
    }

    // 3. Update Effects
    this.effects.update(dt);

    // 4. Camera Follow Player
    if (this.player && !this.player.isDead) {
        const targetPos = this.player.mesh.position.clone();
        targetPos.y += 25;
        targetPos.z += 25;
        camera.position.lerp(targetPos, 0.1);
        camera.lookAt(this.player.mesh.position);
    }

    // 5. Update UI Labels
    this.tanks.forEach(tank => tank.updateLabel(camera));

    // 6. HUD & Minimap
    this.updateHUD();
    this.drawMinimap();

    // Render
    renderer.render(scene, camera);
}

// 全局变量，用于所有类内的便捷访问
let scene, camera, renderer;
const game = new Game();

// ==========================================
// 启动游戏主循环
// ==========================================

function animate() {
    if (!game.isRunning) return;
    requestAnimationFrame(animate);

    const now = Date.now();
    const dt = Math.min(now - game.lastTime, 50); // 限制最大帧间隔防止卡顿跳帧
    game.lastTime = now;

    // 更新所有坦克实体
    for (let i = 0; i < game.tanks.length; i++) {
        const tank = game.tanks[i];
        if (!tank.isDead) {
            tank.update(dt, game.tanks, game.playerInput);
        }
    }

    // 更新所有炮弹实体
    for (let i = game.bullets.length - 1; i >= 0; i--) {
        game.bullets[i].update(dt, game.tanks);
        if (!game.bullets[i].active) {
            game.bullets.splice(i, 1);
        }
    }

    // 更新粒子特效系统
    game.effects.update(dt);

    // 相机跟随玩家坦克，平滑插值避免剧烈抖动
    if (game.player && !game.player.isDead) {
        const offset = new THREE.Vector3(0, 28, 32);
        const targetCamPos = game.player.mesh.position.clone().add(offset);
        camera.position.lerp(targetCamPos, 0.08);

        const lookTarget = game.player.mesh.position.clone();
        lookTarget.y += 1.5;
        camera.lookAt(lookTarget);
    }

    // 同步所有坦克头顶血条标签到屏幕坐标
    for (let i = 0; i < game.tanks.length; i++) {
        game.tanks[i].updateLabel(camera);
    }

    // 刷新HUD面板数据
    game.updateHUD();

    // 绘制小地图战术概览
    game.drawMinimap();

    // 最终渲染当前帧画面
    renderer.render(scene, camera);
}

// 页面加载完成后自动启动动画循环
window.addEventListener('load', () => {
    game.lastTime = Date.now();
    animate();
});

// 窗口大小变化时自适应画布
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
