<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 坦克大战 - Three.js</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
        }
        
        #crosshair {
            position: absolute;
            width: 30px; height: 30px;
            border: 2px solid rgba(0,255,0,0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0,255,0,0.8);
        }
        #crosshair::before { width: 2px; height: 10px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        #crosshair::after { width: 10px; height: 2px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
        
        #hud {
            position: absolute;
            top: 10px; left: 10px;
            color: #0f0;
            font-size: 14px;
            text-shadow: 0 0 5px #0f0;
            pointer-events: none;
        }
        
        #minimap {
            position: absolute;
            bottom: 10px; right: 10px;
            width: 200px; height: 200px;
            border: 2px solid rgba(0,255,0,0.5);
            background: rgba(0,0,0,0.7);
            pointer-events: none;
        }
        
        #minimap canvas { width: 100%; height: 100%; }
        
        #gameOver {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: #fff;
            font-size: 48px;
            text-align: center;
            display: none;
            pointer-events: none;
            text-shadow: 0 0 20px #f00;
        }
        
        #shop {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            background: rgba(0,0,0,0.95);
            border: 2px solid #0f0;
            padding: 30px;
            color: #0f0;
            display: none;
            pointer-events: all;
            min-width: 600px;
        }
        
        #shop h2 { text-align: center; margin-bottom: 20px; font-size: 28px; }
        #shop .tank-card {
            display: inline-block;
            width: 150px;
            padding: 15px;
            margin: 10px;
            border: 1px solid #0f0;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        #shop .tank-card:hover { background: rgba(0,255,0,0.2); transform: scale(1.05); }
        #shop .tank-card.selected { border: 2px solid #ff0; background: rgba(255,255,0,0.2); }
        #shop .tank-card h3 { margin-bottom: 8px; }
        #shop .tank-card p { font-size: 11px; margin: 3px 0; }
        #shop .coin-display { text-align: center; margin: 20px 0; font-size: 20px; }
        #shop button {
            display: block; margin: 20px auto 0;
            padding: 10px 40px; font-size: 18px;
            background: #0f0; color: #000; border: none;
            cursor: pointer; font-weight: bold;
        }
        
        #killFeed {
            position: absolute;
            top: 10px; right: 10px;
            color: #ff0; font-size: 12px;
            text-align: right;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="crosshair"></div>
        <div id="hud">
            <div>❤️ 生命: <span id="hp">100</span></div>
            <div>🎯 击杀: <span id="kills">0</span> / 5</div>
            <div>🪙 金币: <span id="coins">0</span></div>
            <div>🔫 坦克: <span id="tankName">-</span></div>
        </div>
        <div id="minimap"><canvas id="minimapCanvas" width="200" height="200"></canvas></div>
        <div id="killFeed"></div>
        <div id="gameOver"></div>
        <div id="shop">
            <h2>🏪 坦克商店</h2>
            <div class="coin-display">🪙 金币: <span id="shopCoins">0</span></div>
            <div id="tankList"></div>
            <button id="buyBtn">购买并战斗!</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    // ==================== 坦克种类定义 ====================
    const TANK_TYPES = {
        m1a2_abrams: {
            name: 'M1A2 艾布拉姆斯',
            country: '🇺🇸 美国',
            speed: 3.5,
            armor: 100,
            damage: 35,
            fireRate: 1.2,
            health: 150,
            turretSpeed: 2.5,
            bodyColor: 0x8B7355,
            turretColor: 0x6B5344,
            price: 0,
            desc: '均衡型主战坦克，适合新手'
        },
        leopard2a7: {
            name: '豹2A7',
            country: '🇩🇪 德国',
            speed: 4.2,
            armor: 75,
            damage: 40,
            fireRate: 1.0,
            health: 120,
            turretSpeed: 3.0,
            bodyColor: 0x4A5C3A,
            turretColor: 0x3A4C2A,
            price: 500,
            desc: '高机动高伤害，装甲较薄'
        },
        challenger2: {
            name: '挑战者2',
            country: '🇬🇧 英国',
            speed: 2.8,
            armor: 130,
            damage: 45,
            fireRate: 0.8,
            health: 180,
            turretSpeed: 2.0,
            bodyColor: 0x5C5C3A,
            turretColor: 0x4C4C2A,
            price: 800,
            desc: '重甲重炮，移动缓慢'
        },
        t90ms: {
            name: 'T-90MS',
            country: '🇷🇺 俄罗斯',
            speed: 3.8,
            armor: 90,
            damage: 38,
            fireRate: 1.5,
            health: 140,
            turretSpeed: 2.8,
            bodyColor: 0x5C6B4A,
            turretColor: 0x4C5B3A,
            price: 600,
            desc: '俄系经典，性价比高'
        },
        merkava4: {
            name: '梅卡瓦 Mk4',
            country: '🇮🇱 以色列',
            speed: 3.0,
            armor: 120,
            damage: 32,
            fireRate: 1.3,
            health: 160,
            turretSpeed: 2.2,
            bodyColor: 0x7A7A5A,
            turretColor: 0x6A6A4A,
            price: 700,
            desc: '防御优先，生存能力强'
        },
        leclerc: {
            name: '勒克莱尔',
            country: '🇫🇷 法国',
            speed: 4.5,
            armor: 65,
            damage: 36,
            fireRate: 1.4,
            health: 110,
            turretSpeed: 3.5,
            bodyColor: 0x6B7B5B,
            turretColor: 0x5B6B4B,
            price: 900,
            desc: '极速战车，炮台转速最快'
        },
        type99a: {
            name: '99A式',
            country: '🇨🇳 中国',
            speed: 3.6,
            armor: 110,
            damage: 42,
            fireRate: 0.9,
            health: 155,
            turretSpeed: 2.3,
            bodyColor: 0x4A6B3A,
            turretColor: 0x3A5B2A,
            price: 1000,
            desc: '国产精锐，攻守兼备'
        },
        k2_blackpanther: {
            name: 'K2 黑豹',
            country: '🇰🇷 韩国',
            speed: 4.0,
            armor: 80,
            damage: 37,
            fireRate: 1.1,
            health: 130,
            turretSpeed: 3.2,
            bodyColor: 0x5B6B5B,
            turretColor: 0x4B5B4B,
            price: 850,
            desc: '韩系尖端，综合优秀'
        }
    };

    // ==================== 游戏状态 ====================
    let gameState = {
        coins: 0,
        selectedTank: 'm1a2_abrams',
        inShop: true,
        gameRunning: false,
        kills: 0,
        enemyKills: 0
    };

    // ==================== Three.js 场景 ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 100, 400);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 80, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // 光照
    const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 100, 50);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 500;
    dirLight.shadow.camera.left = -150;
    dirLight.shadow.camera.right = 150;
    dirLight.shadow.camera.top = 150;
    dirLight.shadow.camera.bottom = -150;
    scene.add(dirLight);

    // 地面
    const groundGeo = new THREE.PlaneGeometry(400, 400, 40, 40);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x2d4a2d });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // 地面网格线
    const gridHelper = new THREE.GridHelper(400, 80, 0x3a5a3a, 0x2a4a2a);
    scene.add(gridHelper);

    // 障碍物
    const obstacles = [];
    function createObstacle(x, z, w, h, d) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshLambertMaterial({ color: 0x555555 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, h/2, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        obstacles.push({ mesh, box: new THREE.Box3().setFromObject(mesh) });
    }

    // 随机障碍物
    for (let i = 0; i < 30; i++) {
        const x = (Math.random() - 0.5) * 300;
        const z = (Math.random() - 0.5) * 300;
        const w = 4 + Math.random() * 8;
        const h = 3 + Math.random() * 6;
        const d = 4 + Math.random() * 8;
        createObstacle(x, z, w, h, d);
    }

    // 建筑物
    for (let i = 0; i < 10; i++) {
        const x = (Math.random() - 0.5) * 250;
        const z = (Math.random() - 0.5) * 250;
        const w = 10 + Math.random() * 15;
        const h = 8 + Math.random() * 12;
        const d = 10 + Math.random() * 15;
        createObstacle(x, z, w, h, d);
    }

    // ==================== 坦克类 ====================
    class Tank {
        constructor(type, team, x, z, isPlayer) {
            this.type = type;
            this.team = team; // 'player' or 'enemy'
            this.isPlayer = isPlayer;
            this.alive = true;
            this.health = TANK_TYPES[type].health;
            this.maxHealth = TANK_TYPES[type].health;
            
            this.bodyAngle = Math.random() * Math.PI * 2;
            this.turretAngle = this.bodyAngle;
            this.speed = 0;
            this.maxSpeed = TANK_TYPES[type].speed;
            
            this.x = x;
            this.z = z;
            
            this.lastShot = 0;
            this.fireRate = TANK_TYPES[type].fireRate;
            
            this.targetX = x;
            this.targetZ = z;
            
            this.mesh = this.createMesh();
            scene.add(this.mesh);
            
            // 血条
            this.hpBar = this.createHPBar();
            scene.add(this.hpBar);
        }
        
        createMesh() {
            const group = new THREE.Group();
            const t = TANK_TYPES[this.type];
            
            // 履带
            const trackGeo = new THREE.BoxGeometry(4, 1.2, 7);
            const trackMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
            const leftTrack = new THREE.Mesh(trackGeo, trackMat);
            leftTrack.position.set(-2, 0.6, 0);
            leftTrack.castShadow = true;
            group.add(leftTrack);
            
            const rightTrack = new THREE.Mesh(trackGeo, trackMat);
            rightTrack.position.set(2, 0.6, 0);
            rightTrack.castShadow = true;
            group.add(rightTrack);
            
            // 车身
            const bodyGeo = new THREE.BoxGeometry(4, 1.5, 6);
            const bodyMat = new THREE.MeshLambertMaterial({ color: t.bodyColor });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1.8;
            body.castShadow = true;
            group.add(body);
            
            // 炮塔
            this.turretGroup = new THREE.Group();
            const turretGeo = new THREE.CylinderGeometry(1.8, 2.2, 1.5, 8);
            const turretMat = new THREE.MeshLambertMaterial({ color: t.turretColor });
            const turret = new THREE.Mesh(turretGeo, turretMat);
            turret.position.y = 2.8;
            turret.castShadow = true;
            this.turretGroup.add(turret);
            
            // 炮管
            const barrelGeo = new THREE.CylinderGeometry(0.3, 0.3, 5, 8);
            const barrelMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const barrel = new THREE.Mesh(barrelGeo, barrelMat);
            barrel.rotation.x = Math.PI / 2;
            barrel.position.z = 3;
            barrel.castShadow = true;
            this.turretGroup.add(barrel);
            
            group.add(this.turretGroup);
            
            group.position.set(this.x, 0, this.z);
            group.rotation.y = this.bodyAngle;
            
            return group;
        }
        
        createHPBar() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 8;
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(4, 0.5, 1);
            sprite.position.y = 5;
            return sprite;
        }
        
        updateHPBar() {
            const canvas = this.hpBar.material.map.image;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 64, 8);
            const pct = this.health / this.maxHealth;
            ctx.fillStyle = pct > 0.5 ? '#0f0' : pct > 0.25 ? '#ff0' : '#f00';
            ctx.fillRect(0, 0, 64 * pct, 8);
        }
        
        update(dt, keys, mouseWorldPos) {
            if (!this.alive) return;
            
            this.updateHPBar();
            
            if (this.isPlayer) {
                this.handlePlayerInput(dt, keys, mouseWorldPos);
            } else {
                this.handleAI(dt);
            }
            
            // 移动
            this.x += Math.sin(this.bodyAngle) * this.speed * dt;
            this.z += Math.cos(this.bodyAngle) * this.speed * dt;
            
            // 边界
            this.x = Math.max(-190, Math.min(190, this.x));
            this.z = Math.max(-190, Math.min(190, this.z));
            
            // 障碍物碰撞
            this.checkObstacleCollision();
            
            this.mesh.position.set(this.x, 0, this.z);
            this.mesh.rotation.y = this.bodyAngle;
            
            // 炮塔朝向鼠标
            if (this.isPlayer && mouseWorldPos) {
                const dx = mouseWorldPos.x - this.x;
                const dz = mouseWorldPos.z - this.z;
                this.turretAngle = Math.atan2(dx, dz);
            }
            this.turretGroup.rotation.y = this.turretAngle - this.bodyAngle;
            
            this.hpBar.position.set(this.x, 0, this.z);
            this.hpBar.lookAt(camera.position);
        }
        
        handlePlayerInput(dt, keys, mouseWorldPos) {
            const t = TANK_TYPES[this.type];
            let moveX = 0, moveZ = 0;
            
            if (keys['w'] || keys['W']) moveZ -= 1;
            if (keys['s'] || keys['S']) moveZ += 1;
            if (keys['a'] || keys['A']) moveX -= 1;
            if (keys['d'] || keys['D']) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.sqrt(moveX*moveX + moveZ*moveZ);
                moveX /= len; moveZ /= len;
                this.speed = this.maxSpeed;
                this.bodyAngle = Math.atan2(moveX, moveZ);
            } else {
                this.speed *= 0.9;
                if (this.speed < 0.1) this.speed = 0;
            }
            
            // 射击
            if (keys[' '] && Date.now() - this.lastShot > this.fireRate * 1000) {
                this.shoot();
                this.lastShot = Date.now();
            }
        }
        
        handleAI(dt) {
            const t = TANK_TYPES[this.type];
            
            // 找最近的玩家坦克
            let nearestPlayer = null;
            let nearestDist = Infinity;
            playerTanks.forEach(pt => {
                if (!pt.alive) return;
                const d = Math.hypot(pt.x - this.x, pt.z - this.z);
                if (d < nearestDist) { nearestDist = d; nearestPlayer = pt; }
            });
            
            if (!nearestPlayer) return;
            
            // 转向玩家
            const angleToPlayer = Math.atan2(nearestPlayer.x - this.x, nearestPlayer.z - this.z);
            let angleDiff = angleToPlayer - this.bodyAngle;
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            
            this.bodyAngle += Math.sign(angleDiff) * Math.min(Math.abs(angleDiff), 2 * dt);
            
            // 移动
            if (nearestDist > 40) {
                this.speed = this.maxSpeed * 0.8;
            } else if (nearestDist < 20) {
                this.speed = -this.maxSpeed * 0.3;
            } else {
                this.speed = this.maxSpeed * 0.4;
            }
            
            // 炮塔跟踪
            this.turretAngle = angleToPlayer;
            
            // 射击
            if (nearestDist < 100 && Math.abs(angleDiff) < 0.3) {
                if (Date.now() - this.lastShot > this.fireRate * 1000) {
                    this.shoot();
                    this.lastShot = Date.now();
                }
            }
        }
        
        checkObstacleCollision() {
            const tankBox = new THREE.Box3(
                new THREE.Vector3(this.x - 2.5, 0, this.z - 3.5),
                new THREE.Vector3(this.x + 2.5, 3, this.z + 3.5)
            );
            
            for (const obs of obstacles) {
                if (tankBox.intersectsBox(obs.box)) {
                    // 推回
                    this.x -= Math.sin(this.bodyAngle) * this.speed * 0.5;
                    this.z -= Math.cos(this.bodyAngle) * this.speed * 0.5;
                    break;
                }
            }
        }
        
        shoot() {
            const t = TANK_TYPES[this.type];
            const barrelEnd = new THREE.Vector3(0, 0, 5);
            barrelEnd.applyAxisAngle(new THREE.Vector3(0,1,0), this.turretAngle - this.bodyAngle);
            barrelEnd.x += this.x;
            barrelEnd.z += this.z;
            
            const bullet = new Bullet(
                barrelEnd.x, barrelEnd.z,
                this.turretAngle,
                t.damage,
                this.team,
                this
            );
            bullets.push(bullet);
        }
        
        takeDamage(dmg) {
            this.health -= dmg;
            this.updateHPBar();
            if (this.health <= 0) {
                this.alive = false;
                this.mesh.visible = false;
                this.hpBar.visible = false;
                
                if (this.isPlayer) {
                    gameOver('💀 你被击毁了！');
                } else {
                    gameState.kills++;
                    document.getElementById('kills').textContent = gameState.kills;
                    addKillFeed(`击毁了 ${TANK_TYPES[this.type].name}`);
                    if (gameState.kills >= 5) {
                        gameOver('🏆 胜利！你消灭了所有敌方坦克！');
                        gameState.coins += 500;
                        document.getElementById('coins').textContent = gameState.coins;
                    }
                }
            }
        }
    }

    // ==================== 子弹类 ====================
    class Bullet {
        constructor(x, z, angle, damage, team, owner) {
            this.x = x;
            this.z = z;
            this.angle = angle;
            this.damage = damage;
            this.team = team;
            this.owner = owner;
            this.speed = 60;
            this.alive = true;
            this.life = 3;
            
            const geo = new THREE.SphereGeometry(0.3, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: team === 'player' ? 0x00ff00 : 0xff4444 });
            this.mesh = new THREE.Mesh(geo, mat);
            this.mesh.position.set(x, 1, z);
            scene.add(this.mesh);
            
            // 尾焰
            const flameGeo = new THREE.SphereGeometry(0.5, 6, 6);
            const flameMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.6 });
            this.flame = new THREE.Mesh(flameGeo, flameMat);
            this.flame.position.copy(this.mesh.position);
            scene.add(this.flame);
        }
        
        update(dt) {
            if (!this.alive) return;
            
            this.life -= dt;
            if (this.life <= 0) { this.destroy(); return; }
            
            this.x += Math.sin(this.angle) * this.speed * dt;
            this.z += Math.cos(this.angle) * this.speed * dt;
            
            this.mesh.position.set(this.x, 1, this.z);
            this.flame.position.set(this.x, 1, this.z);
            
            // 边界
            if (Math.abs(this.x) > 200 || Math.abs(this.z) > 200) {
                this.destroy(); return;
            }
            
            // 碰撞检测
            this.checkHit();
        }
        
        checkHit() {
            const targets = this.team === 'player' ? enemyTanks : playerTanks;
            for (const tank of targets) {
                if (!tank.alive) continue;
                const d = Math.hypot(tank.x - this.x, tank.z - this.z);
                if (d < 4) {
                    tank.takeDamage(this.damage);
                    this.destroy();
                    // 爆炸效果
                    createExplosion(this.x, 1, this.z);
                    return;
                }
            }
            
            // 障碍物
            for (const obs of obstacles) {
                if (obs.box.containsPoint(new THREE.Vector3(this.x, 1, this.z))) {
                    this.destroy();
                    createExplosion(this.x, 1, this.z);
                    return;
                }
            }
        }
        
        destroy() {
            this.alive = false;
            scene.remove(this.mesh);
            scene.remove(this.flame);
        }
    }

    // ==================== 爆炸效果 ====================
    function createExplosion(x, y, z) {
        const particles = [];
        for (let i = 0; i < 20; i++) {
            const geo = new THREE.SphereGeometry(0.2 + Math.random()*0.3, 6, 6);
            const mat = new THREE.MeshBasicMaterial({ 
                color: new THREE.Color().setHSL(0.05 + Math.random()*0.1, 1, 0.5),
                transparent: true 
            });
            const p = new THREE.Mesh(geo, mat);
            p.position.set(x, y, z);
            p.userData = {
                vx: (Math.random()-0.5)*20,
                vy: Math.random()*15,
                vz: (Math.random()-0.5)*20,
                life: 1
            };
            scene.add(p);
            particles.push(p);
        }
        
        function animateParticles() {
            let allDead = true;
            particles.forEach(p => {
                if (p.userData.life > 0) {
                    allDead = false;
                    p.userData.life -= 0.03;
                    p.position.x += p.userData.vx * 0.016;
                    p.position.y += p.userData.vy * 0.016;
                    p.position.z += p.userData.vz * 0.016;
                    p.userData.vy -= 9.8 * 0.016;
                    p.material.opacity = p.userData.life;
                }
            });
            if (!allDead) requestAnimationFrame(animateParticles);
            else particles.forEach(p => scene.remove(p));
        }
        animateParticles();
    }

    // ==================== 游戏变量 ====================
    let playerTanks = [];
    let enemyTanks = [];
    let bullets = [];
    let keys = {};
    let mouseWorldPos = null;
    
    // 鼠标位置追踪
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const plane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
        const intersect = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, intersect);
        if (intersect) {
            mouseWorldPos = intersect;
            document.getElementById('crosshair').style.left = e.clientX + 'px';
            document.getElementById('crosshair').style.top = e.clientY + 'px';
        }
    });

    // ==================== 商店 ====================
    function showShop() {
        const shop = document.getElementById('shop');
        shop.style.display = 'block';
        gameState.inShop = true;
        gameState.gameRunning = false;
        
        document.getElementById('shopCoins').textContent = gameState.coins;
        
        const list = document.getElementById('tankList');
        list.innerHTML = '';
        
        Object.entries(TANK_TYPES).forEach(([key, tank]) => {
            const card = document.createElement('div');
            card.className = 'tank-card' + (key === gameState.selectedTank ? ' selected' : '');
            card.innerHTML = `
                <h3>${tank.name}</h3>
                <p>${tank.country}</p>
                <p>⚡速度:${tank.speed} 🛡️装甲:${tank.armor}</p>
                <p>💥伤害:${tank.damage} ❤️血量:${tank.health}</p>
                <p>🔄射速:${tank.fireRate}s 🔧炮塔:${tank.turretSpeed}</p>
                <p style="color:#ff0">${tank.price === 0 ? '免费' : '🪙 '+tank.price}</p>
                <p style="font-size:10px;color:#aaa">${tank.desc}</p>
            `;
            card.onclick = () => {
                document.querySelectorAll('.tank-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                gameState.selectedTank = key;
            };
            list.appendChild(card);
        });
        
        document.getElementById('buyBtn').onclick = () => {
            const tank = TANK_TYPES[gameState.selectedTank];
            if (gameState.coins >= tank.price) {
                gameState.coins -= tank.price;
                shop.style.display = 'none';
                startGame();
            } else {
                alert('金币不足！');
            }
        };
    }

    // ==================== 开始游戏 ====================
    function startGame() {
        gameState.gameRunning = true;
        gameState.kills = 0;
        document.getElementById('kills').textContent = '0';
        document.getElementById('tankName').textContent = TANK_TYPES[gameState.selectedTank].name;
        
        // 清除旧坦克
        playerTanks.forEach(t => scene.remove(t.mesh));
        enemyTanks.forEach(t => scene.remove(t.mesh));
        playerTanks = [];
        enemyTanks = [];
        bullets.forEach(b => b.destroy());
        bullets = [];
        
        // 玩家坦克
        const px = (Math.random()-0.5) * 100;
        const pz = 80 + Math.random() * 40;
        playerTanks.push(new Tank(gameState.selectedTank, 'player', px, pz, true));
        
        // 敌方5辆坦克
        const enemyTypes = Object.keys(TANK_TYPES).filter(k => k !== gameState.selectedTank);
        for (let i = 0; i < 5; i++) {
            const ex = (Math.random()-0.5) * 150;
            const ez = -60 - Math.random() * 80;
            const et = enemyTypes[i % enemyTypes.length];
            enemyTanks.push(new Tank(et, 'enemy', ex, ez, false));
        }
        
        camera.position.set(px, 80, pz + 50);
    }

    // ==================== 游戏结束 ====================
    function gameOver(msg) {
        gameState.gameRunning = false;
        const el = document.getElementById('gameOver');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => {
            el.style.display = 'none';
            showShop();
        }, 3000);
    }

    // 击杀信息
    function addKillFeed(msg) {
        const el = document.getElementById('killFeed');
        const div = document.createElement('div');
        div.textContent = msg;
        el.prepend(div);
        setTimeout(() => div.remove(), 4000);
    }

    // ==================== 小地图 ====================
    function updateMinimap() {
        const canvas = document.getElementById('minimapCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 200, 200);
        
        ctx.fillStyle = 'rgba(0,30,0,0.8)';
        ctx.fillRect(0, 0, 200, 200);
        
        const scale = 200 / 400;
        const offset = 100;
        
        // 障碍物
        ctx.fillStyle = '#444';
        obstacles.forEach(o => {
            const ox = o.mesh.position.x * scale + offset;
            const oz = o.mesh.position.z * scale + offset;
            ctx.fillRect(ox-2, oz-2, 4, 4);
        });
        
        // 敌方
        enemyTanks.forEach(t => {
            if (!t.alive) return;
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(t.x * scale + offset, t.z * scale + offset, 4, 0, Math.PI*2);
            ctx.fill();
        });
        
        // 玩家
        playerTanks.forEach(t => {
            if (!t.alive) return;
            ctx.fillStyle = '#0f0';
            ctx.beginPath();
            ctx.arc(t.x * scale + offset, t.z * scale + offset, 5, 0, Math.PI*2);
            ctx.fill();
        });
    }

    // ==================== 主循环 ====================
    let lastTime = performance.now();
    
    function gameLoop() {
        requestAnimationFrame(gameLoop);
        
        const now = performance.now();
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        
        if (gameState.gameRunning) {
            // 更新坦克
            playerTanks.forEach(t => t.update(dt, keys, mouseWorldPos));
            enemyTanks.forEach(t => t.update(dt, keys, null));
            
            // 更新子弹
            bullets.forEach(b => b.update(dt));
            bullets = bullets.filter(b => b.alive);
            
            // 相机跟随玩家
            if (playerTanks.length > 0 && playerTanks[0].alive) {
                const p = playerTanks[0];
                camera.position.x += (p.x - camera.position.x) * 0.05;
                camera.position.z += (p.z + 50 - camera.position.z) * 0.05;
                camera.lookAt(p.x, 0, p.z);
            }
            
            // 更新HUD
            if (playerTanks[0]) {
                document.getElementById('hp').textContent = Math.max(0, Math.round(playerTanks[0].health));
            }
            
            // 小地图
            updateMinimap();
        }
        
        renderer.render(scene, camera);
    }

    // ==================== 输入 ====================
    window.addEventListener('keydown', e => { keys[e.key] = true; });
    window.addEventListener('keyup', e => { keys[e.key] = false; });
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==================== 启动 ====================
    showShop();
    gameLoop();
    </script>
</body>
</html>
